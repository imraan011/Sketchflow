<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Excali Draw - A beautiful browser-based drawing board built from scratch.">
  <title>Excali Draw - Collaborative Whiteboard</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- Sketchflow Branding Header/Logo -->
  <header id="app-header">
    <div class="logo-container">
      <span class="logo-icon">✎</span>
      <h1 class="logo-text">Sketchflow</h1>
    </div>
  </header>

  <!-- Canvas standard layout full screen display ke liye -->
  <canvas id="app-canvas"></canvas>

  <!-- Toolbar placeholder, buttons and options rules key features me Phase 2 se aayenge -->
  <div id="toolbar" role="toolbar" aria-label="Drawing Tools">
    <button data-tool="select" class="active">Select</button>
    <button data-tool="hand" title="Pan Canvas (Space+Drag)">Hand</button>
    <button data-tool="rectangle">Rectangle</button>
    <button data-tool="ellipse">Ellipse</button>
    <button data-tool="line">Line</button>
    <button data-tool="arrow">Arrow</button>
    <button data-tool="pencil">Pencil</button>
    <button data-tool="eraser">Eraser</button>
    <span class="toolbar-separator"></span>
    <button id="import-btn" title="Import JSON File">Import</button>
    <button id="export-btn" title="Export JSON File">Export</button>
    <span class="toolbar-separator"></span>
    <button id="reset-btn" title="Reset Canvas Completely" class="danger-btn">Reset</button>
  </div>

  <!-- Zoom controls indicator floating dynamically -->
  <div id="zoom-controls">
    <button id="zoom-reset-btn" title="Reset Zoom (Ctrl+0)">100%</button>
  </div>

  <!-- Status saved notification indicator -->
  <div id="status-indicator">Saved</div>

  <!-- Hidden input fields for importing json files -->
  <input type="file" id="import-file-input" accept=".json" style="display: none;">

  <!-- Entry point loaded as ES Module -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
