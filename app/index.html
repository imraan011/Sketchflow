<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sketchflow - A beautiful browser-based drawing board built from scratch.">
  <title>Sketchflow — Infinite Canvas</title>
  <!-- Main app styles (updated to relative parent directory paths) -->
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <!-- Branding header -->
  <header id="app-header">
    <div class="logo-container">
      <span class="logo-icon">✎</span>
      <h1 class="logo-text">Sketchflow</h1>
    </div>
  </header>

  <!-- Full-screen canvas -->
  <canvas id="app-canvas"></canvas>

  <!-- Drawing tools toolbar (center, top) — icon-only -->
  <div id="toolbar" role="toolbar" aria-label="Drawing Tools">
    <button data-tool="select" class="active" data-tooltip="Select (V or 1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
    </button>
    <button data-tool="hand" data-tooltip="Hand (H or Space)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8l-1-1a2 2 0 0 0-3 3l4 4a6 6 0 0 0 6 0l1-1a6 6 0 0 0 1-3.5V11a2 2 0 0 0-2-2z"/></svg>
    </button>
    <span class="toolbar-separator"></span>
    <button data-tool="rectangle" data-tooltip="Rectangle (R or 2)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
    </button>
    <button data-tool="ellipse" data-tooltip="Ellipse (O or 3)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
    </button>
    <button data-tool="line" data-tooltip="Line (L or 4)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>
    <button data-tool="arrow" data-tooltip="Arrow (A or 5)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="8 5 19 5 19 16"/></svg>
    </button>
    <span class="toolbar-separator"></span>
    <button data-tool="pencil" data-tooltip="Pencil (P or 6)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
    <button data-tool="eraser" data-tooltip="Eraser">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11l7 7"/></svg>
    </button>
    <span class="toolbar-separator"></span>
    <button id="undo-btn" data-tooltip="Undo (Ctrl+Z)" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    </button>
    <button id="redo-btn" data-tooltip="Redo (Ctrl+Y or Ctrl+Shift+Z)" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
    </button>
  </div>

  <!-- Action bar (bottom-left): file operations -->
  <div id="action-bar" role="toolbar" aria-label="File Actions">
    <button id="import-btn" data-tooltip="Import (.json)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button id="export-btn" data-tooltip="Export project (.json)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button id="export-png-btn" data-tooltip="Export image (.png)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <span class="toolbar-separator"></span>
    <button id="reset-btn" data-tooltip="Reset canvas" class="danger-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
  </div>

  <!-- Zoom controls (bottom-right) -->
  <div id="zoom-controls">
    <button id="zoom-reset-btn" title="Reset Zoom (Ctrl+0)">100%</button>
  </div>

  <!-- Autosave status indicator (top-right) -->
  <div id="status-indicator">Saved</div>

  <!-- Hidden file input for JSON import -->
  <input type="file" id="import-file-input" accept=".json" style="display: none;">

  <!-- ES Module entry point (updated to relative parent directory path) -->
  <script type="module" src="../js/main.js"></script>
</body>
</html>
